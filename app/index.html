<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBR Simulation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111827; color: #e5e7eb; font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; }
    #app { position: relative; width: 100vw; height: 100vh; }
    #network-svg { width: 100%; height: 100%; display: block; }

    #controls {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(4px);
      border: 1px solid #374151; border-radius: 8px;
      padding: 8px 16px; display: flex; align-items: center; gap: 12px;
    }
    #play-btn {
      background: none; border: 1px solid #6b7280; color: #e5e7eb;
      border-radius: 4px; width: 30px; height: 30px; cursor: pointer; font-size: 12px;
    }
    #play-btn:hover { border-color: #e5e7eb; }
    #speed-slider { width: 80px; accent-color: #6366f1; }
    #speed-label { font-size: 12px; color: #9ca3af; min-width: 28px; }
    #sim-clock { font-size: 12px; color: #9ca3af; font-variant-numeric: tabular-nums; min-width: 56px; }

    #panel {
      position: absolute; top: 64px; right: 12px; width: 210px;
      background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(4px);
      border: 1px solid #374151; border-radius: 8px;
      padding: 12px; display: none;
    }
    #panel.visible { display: block; }
    #panel h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: #f9fafb; }
    .line-chip {
      display: inline-block; border-radius: 3px; padding: 1px 6px;
      font-size: 11px; font-weight: 700; color: #fff; vertical-align: middle;
    }
    .field { font-size: 12px; color: #9ca3af; margin-top: 5px; line-height: 1.4; }
    .field span { color: #e5e7eb; }
    .arrival {
      font-size: 12px; padding: 4px 0; border-bottom: 1px solid #1f2937;
      color: #d1d5db; display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .arrival:last-child { border-bottom: none; }
    #arrivals-list { margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <svg id="network-svg"></svg>
    <div id="controls">
      <button id="play-btn">❚❚</button>
      <input id="speed-slider" type="range" min="0" max="5" step="1" value="2">
      <span id="speed-label">1×</span>
      <span id="sim-clock">00:00</span>
    </div>
    <div id="panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
